<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking | Gagan Jaimala</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

    <header>
        <h1 onclick="window.location.href='index.html'" style="cursor:pointer">Gagan Jaimala</h1>
        <div style="display: flex; gap: 10px;">
            
            <button class="cart-button" id="open-cart-btn">🛒 कार्ट (<span id="cart-count">0</span>)</button>
        </div>
    </header>

    <div class="container">
        <div id="category-section">
            <h2 class="section-title">कैटेगरी चुनें</h2>
            <div class="category-grid">
                <div class="cat-card" onclick="loadProductsByCategory('Jaimala Stage')">Jaimala Stage</div>
                <div class="cat-card" onclick="loadProductsByCategory('Hydraulic jaimala')">Hydraulic Jaimala</div>
                <div class="cat-card" onclick="loadProductsByCategory('Mandap stage')">Mandap Stage</div>
                <div class="cat-card" onclick="loadProductsByCategory('Haldi stage')">Haldi Stage</div>
                <div class="cat-card" onclick="loadProductsByCategory('Mehandi stage')">Mehandi Stage</div>
                <div class="cat-card" onclick="loadProductsByCategory('Flower gate')">Flower Gate</div>
            </div>
        </div>

        <div id="product-section" style="display:none;">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 id="current-category-title">प्रोडक्ट्स</h2>
                <button class="btn-back" onclick="showCategories()">← वापस</button>
            </div>
            <div id="product-grid"></div>
        </div>
    </div>

    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>आपका कार्ट</h2>
            <div id="cart-items-list"></div>
            <hr>
            <form id="checkout-form">
                <input type="text" id="customer-name" placeholder="आपका नाम" required>
                <input type="tel" id="customer-phone" placeholder="फ़ोन नंबर" required>
                <input type="date" id="booking-date" required>
                <button type="submit" id="checkout-btn">ऑर्डर कन्फर्म करें & PDF डाउनलोड करें</button>
            </form>
        </div>
    </div>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://groivrufuhcnhbygghog.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdyb2l2cnVmdWhjbmhieWdnaG9nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NTA4NzEsImV4cCI6MjA4OTEyNjg3MX0.MpEkthbuaeojJS_mUwyh-RrnHTLQ5SNKnscysqMC7hw'; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const SIGN_URL = "https://res.cloudinary.com/djnns1qlt/image/upload/f_auto,q_auto/1000056471_imlbyg";

        let cart = [];

        async function loadProductsByCategory(cat) {
            document.getElementById('category-section').style.display = 'none';
            document.getElementById('product-section').style.display = 'block';
            document.getElementById('current-category-title').innerText = cat;
            const { data } = await supabaseClient.from('products').select('*').eq('category', cat);
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            data.forEach(p => {
                grid.innerHTML += `<div class="product-card">
                    <img src="${p.media_url}" class="product-media">
                    <h3>${p.name}</h3>
                    <p>₹${p.price}</p>
                    <button onclick="addToCart(${p.id}, '${p.name}', ${p.price})">Add to Cart</button>
                </div>`;
            });
        }

        function showCategories() {
            document.getElementById('category-section').style.display = 'block';
            document.getElementById('product-section').style.display = 'none';
        }

        function addToCart(id, name, price) {
            cart.push({id, name, price});
            document.getElementById('cart-count').innerText = cart.length;
            updateCartList();
        }

        function updateCartList() {
            const list = document.getElementById('cart-items-list');
            list.innerHTML = cart.map(i => `<p>${i.name} - ₹${i.price}</p>`).join('');
        }

        async function generatePDF(name, phone, date, bookingId) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFontSize(22);
            doc.setTextColor(93, 51, 29);
            doc.text("GAGAN JAIMALA", 105, 20, null, null, "center");
            
            doc.setFontSize(10);
            doc.setTextColor(0, 0, 0);
            doc.text(`Booking ID: ${bookingId}`, 150, 30);
            doc.text(`Date: ${new Date().toLocaleDateString()}`, 150, 35);

            doc.setFontSize(12);
            doc.text("Customer Details:", 20, 50);
            doc.text(`Name: ${name}`, 20, 60);
            doc.text(`Phone: ${phone}`, 20, 70);
            doc.text(`Event Date: ${date}`, 20, 80);

            doc.line(20, 90, 190, 90);
            doc.text("Product Name", 25, 97);
            doc.text("Price", 160, 97);
            doc.line(20, 100, 190, 100);

            let y = 110;
            let total = 0;
            cart.forEach(item => {
                doc.text(item.name, 25, y);
                doc.text(`Rs. ${item.price}`, 160, y);
                total += item.price;
                y += 10;
            });

            doc.line(20, y, 190, y);
            doc.setFont(undefined, 'bold');
            doc.text("TOTAL AMOUNT:", 110, y + 10);
            doc.text(`Rs. ${total}`, 160, y + 10);

            doc.setFont(undefined, 'normal');
            doc.text("Authorized Signature:", 140, y + 30);
            
            try {
                doc.addImage(SIGN_URL, 'PNG', 140, y + 35, 40, 20);
            } catch(e) {
                doc.text("___________________", 140, y + 45);
            }

            doc.save(`Receipt_${bookingId}.pdf`);
        }

        document.getElementById('checkout-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Check if user is logged in
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) {
                alert("Pehle Login karein tabhi order kar sakte hain!");
                window.location.href = 'auth.html';
                return;
            }

            if(cart.length === 0) {
                alert("Cart khali hai!");
                return;
            }

            const bookingId = "GJ-" + Math.floor(1000 + Math.random() * 9000);
            const name = document.getElementById('customer-name').value;
            const phone = document.getElementById('customer-phone').value;
            const date = document.getElementById('booking-date').value;
            const itemsList = cart.map(i => i.name).join(', ');
            const totalPrice = cart.reduce((sum, item) => sum + item.price, 0);

            // 1. Save to Supabase 'orders' table
            const { error } = await supabaseClient.from('orders').insert([{
                user_id: user.id,
                customer_name: name,
                items: itemsList,
                total_price: totalPrice,
                booking_id: bookingId
            }]);

            if (error) {
                alert("Order save karne mein galti hui: " + error.message);
                return;
            }

            // 2. Send to Web3Forms
            await fetch("https://api.web3forms.com/submit", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    access_key: "06ced9fc-e3ab-4485-a2c8-3808a3d63f8f",
                    subject: `New Booking: ${bookingId}`,
                    message: `ID: ${bookingId}\nName: ${name}\nPhone: ${phone}\nDate: ${date}\nItems: ${itemsList}`
                }),
            });

            // 3. Generate PDF
            await generatePDF(name, phone, date, bookingId);
            
            alert("Booking Successful! Aapka order history mein save ho gaya hai.");
            window.location.href = 'history.html'; // Redirect to history
        });

        const modal = document.getElementById('cart-modal');
        document.getElementById('open-cart-btn').onclick = () => modal.style.display = 'block';
        document.querySelector('.close-button').onclick = () => modal.style.display = 'none';
    </script>
</body>
</html>
