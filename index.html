<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gagan Jaimala | Login & Signup</title>
    
    <link rel="icon" type="image/x-icon" href="IMG-20260318-WA0001.jpg">
    <link rel="shortcut icon" href="IMG-20260318-WA0001.jpg" type="image/jpeg">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fffcf5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; border-top: 5px solid #5d331d; }
        h2 { color: #5d331d; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #5d331d; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #452615; }
        .toggle-link { margin-top: 15px; color: #5d331d; cursor: pointer; text-decoration: underline; font-size: 14px; display: block; }
        #message { margin-top: 15px; font-size: 14px; font-weight: bold; min-height: 20px; }
        /* Name field shuru mein hidden rahega */
        #name-field { display: none; }
    </style>
</head>
<body>

<div class="auth-container">
    <h2 id="auth-title">Login Karein</h2>
    
    <div id="name-field">
        <input type="text" id="full-name" placeholder="Apna Poora Naam Likhein">
    </div>

    <input type="email" id="email" placeholder="Apna Email Likhein" required>
    <input type="password" id="password" placeholder="Password Likhein" required>
    
    <button id="auth-btn" onclick="handleAuth()">Login</button>
    
    <div id="message"></div>
    
    <span class="toggle-link" id="toggle-link" onclick="toggleAuth()">Naya account banana hai? Signup karein</span>
</div>

<script>
    const SUPABASE_URL = 'https://groivrufuhcnhbygghog.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdyb2l2cnVmdWhjbmhieWdnaG9nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NTA4NzEsImV4cCI6MjA4OTEyNjg3MX0.MpEkthbuaeojJS_mUwyh-RrnHTLQ5SNKnscysqMC7hw';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isLoginMode = true;

    function toggleAuth() {
        isLoginMode = !isLoginMode;
        const nameField = document.getElementById('name-field');
        const authTitle = document.getElementById('auth-title');
        const authBtn = document.getElementById('auth-btn');
        const toggleLink = document.getElementById('toggle-link');

        if (isLoginMode) {
            authTitle.innerText = 'Login Karein';
            authBtn.innerText = 'Login';
            toggleLink.innerText = 'Naya account banana hai? Signup karein';
            nameField.style.display = 'none';
        } else {
            authTitle.innerText = 'Naya Account Banayein';
            authBtn.innerText = 'Signup';
            toggleLink.innerText = 'Pehle se account hai? Login karein';
            nameField.style.display = 'block';
        }
        document.getElementById('message').innerText = '';
    }

    async function handleAuth() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const fullName = document.getElementById('full-name').value;
        const msg = document.getElementById('message');

        if (!email || !password) {
            msg.innerText = "Email aur Password dono bhariye!";
            msg.style.color = "red";
            return;
        }

        msg.innerText = "Loading...";
        msg.style.color = "#5d331d";

        try {
            if (isLoginMode) {
                // LOGIN PROCESS
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) throw error;
                
                msg.innerText = "Login Safal! Redirecting...";
                msg.style.color = "green";
                
                setTimeout(() => { window.location.href = 'home.html'; }, 1000);

            } else {
                // SIGNUP PROCESS
                if (!fullName) {
                    msg.innerText = "Kripya apna naam bhi likhein!";
                    msg.style.color = "red";
                    return;
                }

                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            display_name: fullName // Yahan naam save ho raha hai
                        }
                    }
                });
                
                if (error) throw error;
                
                msg.innerText = "Account ban gaya! Ab login karein.";
                msg.style.color = "green";
                setTimeout(toggleAuth, 2000);
            }
        } catch (err) {
            msg.innerText = "Galti: " + err.message;
            msg.style.color = "red";
        }
    }

    async function checkUser() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (user) { window.location.href = 'home.html'; }
    }
    checkUser();
</script>

</body>
</html>
