<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Signup - Gagan Jaimala</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fffcf5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0px 8px 20px rgba(0,0,0,0.1); width: 90%; max-width: 350px; text-align: center; border: 1px solid #eee; }
        h2 { color: #5d331d; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #5d331d; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #452615; transform: translateY(-1px); }
        .toggle-link { margin-top: 20px; color: #007bff; cursor: pointer; text-decoration: none; font-size: 14px; display: block; }
        .toggle-link:hover { text-decoration: underline; }
        #msg { margin-top: 20px; font-size: 14px; font-weight: 500; min-height: 20px; padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2 id="form-title">Login Karein</h2>
        
        <input type="email" id="email" placeholder="Email Address" autocomplete="email">
        <input type="password" id="password" placeholder="Password (Min 6 characters)" autocomplete="current-password">
        
        <button id="auth-btn">Login</button>
        
        <p id="toggle-text" class="toggle-link">Naya account banayein (Sign Up)</p>
        <div id="msg"></div>
    </div>

    <script>
        // Singleton Pattern to avoid "Already declared" error
        (function() {
            const SUPABASE_URL = 'https://groivrufuhcnhbygghog.supabase.co';
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdyb2l2cnVmdWhjbmhieWdnaG9nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NTA4NzEsImV4cCI6MjA4OTEyNjg3MX0.MpEkthbuaeojJS_mUwyh-RrnHTLQ5SNKnscysqMC7hw';
            
            // Check if Supabase is loaded
            if (typeof window.supabase === 'undefined') {
                console.error("Supabase library not loaded!");
                return;
            }

            const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            let isLoginMode = true;
            const authBtn = document.getElementById('auth-btn');
            const toggleText = document.getElementById('toggle-text');
            const msgBox = document.getElementById('msg');

            // Toggle Function
            toggleText.addEventListener('click', () => {
                isLoginMode = !isLoginMode;
                document.getElementById('form-title').innerText = isLoginMode ? "Login Karein" : "Sign Up Karein";
                authBtn.innerText = isLoginMode ? "Login" : "Sign Up";
                toggleText.innerText = isLoginMode ? "Naya account banayein (Sign Up)" : "Purana account hai? Login karein";
                msgBox.innerText = "";
            });

            // Auth Action
            authBtn.addEventListener('click', async () => {
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                if (!email || !password) {
                    showMsg("Email aur Password bharein!", "red");
                    return;
                }

                if (password.length < 6) {
                    showMsg("Password kam se kam 6 chars ka hona chahiye!", "red");
                    return;
                }

                showMsg("Processing...", "orange");
                authBtn.disabled = true;

                try {
                    if (isLoginMode) {
                        // LOGIN LOGIC
                        const { data, error } = await client.auth.signInWithPassword({ email, password });
                        if (error) throw error;
                        
                        showMsg("Login Safal! Redirecting...", "green");
                        setTimeout(() => { window.location.href = 'categories.html'; }, 1500);
                    } else {
                        // SIGN UP LOGIC
                        const { data, error } = await client.auth.signUp({ email, password });
                        if (error) throw error;
                        
                        showMsg("Sign Up Safal! Ab Login karein.", "green");
                        setTimeout(() => { toggleText.click(); }, 2500);
                    }
                } catch (err) {
                    showMsg("Galti: " + err.message, "red");
                    console.error("Auth Error:", err.message);
                } finally {
                    authBtn.disabled = false;
                }
            });

            function showMsg(text, color) {
                msgBox.innerText = text;
                msgBox.style.color = color;
            }
        })();
    </script>
</body>
</html>
