<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gagan Jaimala | जयमाला स्टेज बिजनेस</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header>
        <h1 onclick="location.reload()" style="cursor:pointer">Gagan Jaimala</h1>
        <div class="nav-right">
            <button class="login-btn" onclick="alert('Login System jald hi aa raha hai!')">Sign In / Sign Up</button>
            <button class="cart-button" id="open-cart-btn">🛒 कार्ट (<span id="cart-count">0</span>)</button>
        </div>
    </header>

    <div class="hero-wrapper">
        <div id="slideshow-container">
            </div>
        <div class="welcome-overlay">
            <h1>Welcome to Gagan Jaimala</h1>
            <p>Aapki Khushiyon Ka Perfect Partner</p>
            <button class="btn-continue" onclick="scrollToCategories()">Continue Booking</button>
        </div>
    </div>

    <div class="container">
        
        <div id="category-section">
            <h2 class="section-title">हमारी कैटेगरी</h2>
            <div class="category-grid">
                <div class="cat-card" onclick="loadProductsByCategory('Jaimala Stage')">Jaimala Stage</div>
                <div class="cat-card" onclick="loadProductsByCategory('Hydraulic jaimala')">Hydraulic Jaimala</div>
                <div class="cat-card" onclick="loadProductsByCategory('Mandap stage')">Mandap Stage</div>
                <div class="cat-card" onclick="loadProductsByCategory('Haldi stage')">Haldi Stage</div>
                <div class="cat-card" onclick="loadProductsByCategory('Mehandi stage')">Mehandi Stage</div>
                <div class="cat-card" onclick="loadProductsByCategory('Flower gate')">Flower Gate</div>
            </div>
        </div>

        <div id="product-section" style="display:none;">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 id="current-category-title" style="margin:0;">प्रोडक्ट्स</h2>
                <button class="btn-back" onclick="showCategories()">← वापस</button>
            </div>
            <div id="product-grid"></div>
        </div>

    </div>

    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>आपका कार्ट</h2>
            <div id="cart-items-list"></div>
            <hr>
            <h3>ऑर्डर करने के लिए जानकारी भरें</h3>
            <form id="checkout-form">
                <div class="form-group">
                    <label for="customer-name">नाम:</label>
                    <input type="text" id="customer-name" required>
                </div>
                <div class="form-group">
                    <label for="customer-email">ईमेल:</label>
                    <input type="email" id="customer-email" required>
                </div>
                <div class="form-group">
                    <label for="customer-phone">फ़ोन नंबर:</label>
                    <input type="tel" id="customer-phone" required>
                </div>
                <div class="form-group">
                    <label for="booking-date">बुकिंग की तारीख (Kab Jana Hai):</label>
                    <input type="date" id="booking-date" required>
                </div>
                <div class="form-group">
                    <label for="event-location">कार्यक्रम की जगह (Location):</label>
                    <input type="text" id="event-location" placeholder="Purnea, Bihar" required>
                </div>
                <button type="submit" id="checkout-btn">ऑर्डर कन्फर्म करें और रसीद पाएँ</button>
            </form>
        </div>
    </div>

    <script>
        // --- SUPABASE SETUP ---
        const SUPABASE_URL = 'https://groivrufuhcnhbygghog.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdyb2l2cnVmdWhjbmhieWdnaG9nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NTA4NzEsImV4cCI6MjA4OTEyNjg3MX0.MpEkthbuaeojJS_mUwyh-RrnHTLQ5SNKnscysqMC7hw'; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const productGrid = document.getElementById('product-grid');
        const cartCount = document.getElementById('cart-count');
        const categorySection = document.getElementById('category-section');
        const productSection = document.getElementById('product-section');
        let cart = [];

        // 1. SLIDESHOW LOGIC: Admin panel se uploaded photos dikhayega
        async function initSlideshow() {
            const { data, error } = await supabaseClient
                .from('products')
                .select('media_url')
                .limit(6);

            if (error || !data || data.length === 0) return;

            const container = document.getElementById('slideshow-container');
            data.forEach((item, index) => {
                const img = document.createElement('img');
                img.src = item.media_url;
                img.className = 'slide-img' + (index === 0 ? ' active' : '');
                container.appendChild(img);
            });

            let currentSlide = 0;
            const images = document.querySelectorAll('.slide-img');
            setInterval(() => {
                images[currentSlide].classList.remove('active');
                currentSlide = (currentSlide + 1) % images.length;
                images[currentSlide].classList.add('active');
            }, 4000);
        }

        function scrollToCategories() {
            categorySection.scrollIntoView({ behavior: 'smooth' });
        }

        function showCategories() {
            categorySection.style.display = 'block';
            productSection.style.display = 'none';
        }

        async function loadProductsByCategory(categoryName) {
            categorySection.style.display = 'none';
            productSection.style.display = 'block';
            document.getElementById('current-category-title').innerText = categoryName;
            productGrid.innerHTML = '<p style="text-align:center;">लोड हो रहा है...</p>';

            const { data, error } = await supabaseClient
                .from('products')
                .select('*')
                .eq('category', categoryName);

            productGrid.innerHTML = '';
            if (data && data.length > 0) {
                data.forEach(product => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.innerHTML = `
                        <img src="${product.media_url}" alt="${product.name}" class="product-media">
                        <div class="product-info">
                            <h3>${product.name}</h3>
                            <p class="price">₹${product.price.toLocaleString()}</p>
                            <button class="add-to-cart-btn" onclick="addToCart(${product.id}, '${product.name}', ${product.price})">कार्ट में जोड़ें</button>
                        </div>
                    `;
                    productGrid.appendChild(card);
                });
            } else {
                productGrid.innerHTML = '<p style="text-align:center; grid-column: 1/-1;">कोई प्रोडक्ट नहीं मिला।</p>';
            }
        }

        function addToCart(id, name, price) {
            const existing = cart.find(item => item.id === id);
            if (existing) { alert('यह पहले से कार्ट में है।'); }
            else {
                cart.push({ id, name, price });
                alert(`'${name}' कार्ट में जोड़ दिया गया।`);
            }
            updateCartUI();
        }
        
        function updateCartUI() {
            cartCount.innerText = cart.length;
            const list = document.getElementById('cart-items-list');
            list.innerHTML = cart.length === 0 ? '<p>कार्ट खाली है।</p>' : '';
            cart.forEach(item => {
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `<span>${item.name}</span> <strong>₹${item.price.toLocaleString()}</strong>`;
                list.appendChild(div);
            });
        }

        // Modal Controls
        const modal = document.getElementById('cart-modal');
        document.getElementById('open-cart-btn').onclick = () => { modal.style.display = 'block'; updateCartUI(); }
        document.querySelector('.close-button').onclick = () => { modal.style.display = 'none'; }

        // Checkout & PDF Receipt (Logic Placeholder)
        document.getElementById('checkout-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            alert('ऑर्डर कन्फर्म! आपकी PDF रसीद तैयार की जा रही है...');
            // Yahan PDF generation aur Email ka code aayega jspdf use karke
            cart = []; updateCartUI(); modal.style.display = 'none';
        });

        // Initialize Slideshow on Load
        initSlideshow();
    </script>
</body>
</html>
