<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gagan Jaimala | Home</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #fffcf5; text-align: center; }
        header { background: #5d331d; color: white; padding: 15px; position: relative; }
        
        /* Profile Sidebar */
        .profile-icon { position: absolute; top: 15px; right: 15px; background: #C5A059; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid white; font-size: 20px; }
        .sidebar { position: fixed; top: 0; right: -280px; width: 260px; height: 100%; background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.2); transition: 0.4s; z-index: 2000; padding: 20px; text-align: left; }
        .sidebar.active { right: 0; }
        .close-btn { font-size: 30px; cursor: pointer; color: #5d331d; }
        
        .menu-btn { display: block; width: 100%; padding: 12px; margin: 10px 0; background: #5d331d; color: white; border: none; border-radius: 8px; text-align: center; text-decoration: none; font-weight: bold; cursor: pointer; }
        .menu-btn.contact { background: #25D366; }

        .slideshow-container { width: 95%; margin: 20px auto; height: 300px; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .mySlides { display: none; width: 100%; height: 100%; }
        .mySlides img { width: 100%; height: 100%; object-fit: cover; }
        .welcome-text { font-size: 22px; color: #5d331d; font-weight: bold; margin: 20px 0; }
        .booking-btn { background: #5d331d; color: white; padding: 15px 30px; border-radius: 30px; text-decoration: none; font-size: 18px; font-weight: bold; display: inline-block; }
    </style>
</head>
<body>

    <header>
        <h1>Gagan Jaimala</h1>
        <div class="profile-icon" onclick="toggleMenu()">👤</div>
    </header>

    <div class="sidebar" id="sidebar">
        <span class="close-btn" onclick="toggleMenu()">×</span>
        <h3 style="color:#5d331d; border-bottom: 2px solid #eee; padding-bottom:10px;">Aapka Profile</h3>
        <p id="user-name" style="font-weight:bold; margin-bottom:5px;">Naam: Loading...</p>
        <p id="user-email" style="font-size:13px; color:#666;">Email: Loading...</p>
        <hr>
        <a href="history.html" class="menu-btn">My Orders</a>
        <a href="tel:+918873377742" class="menu-btn contact">📞 Contact Us</a>
        <button onclick="logout()" class="menu-btn" style="background:#cc0000;">Logout</button>
    </div>

    <div class="welcome-text" id="welcome-msg">Welcome, Guest</div>

    <div class="slideshow-container" id="slideshow-box">
        <p style="padding-top:130px;">Photos load ho rahi hain...</p>
    </div>

    <div style="padding: 20px;">
        <p>Best Stage Decoration ke liye niche click karein:</p>
        <a href="categories.html" class="booking-btn">Booking Now</a>
    </div>

    <script>
        const SUPABASE_URL = 'https://groivrufuhcnhbygghog.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdyb2l2cnVmdWhjbmhieWdnaG9nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NTA4NzEsImV4cCI6MjA4OTEyNjg3MX0.MpEkthbuaeojJS_mUwyh-RrnHTLQ5SNKnscysqMC7hw';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }

        async function loadProfile() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                const name = user.user_metadata.display_name || "Prince";
                document.getElementById('welcome-msg').innerText = "Welcome, " + name;
                document.getElementById('user-name').innerText = "Naam: " + name;
                document.getElementById('user-email').innerText = "Email: " + user.email;
            } else {
                window.location.href = 'index.html';
            }
        }

        async function logout() { await supabase.auth.signOut(); window.location.href = 'index.html'; }

        async function initSlides() {
            const { data } = await supabase.from('products').select('media_url').limit(5);
            const box = document.getElementById('slideshow-box');
            if (data && data.length > 0) {
                box.innerHTML = data.map(i => `<div class="mySlides"><img src="${i.media_url}"></div>`).join('');
                startAnim();
            }
        }

        let idx = 0;
        function startAnim() {
            let s = document.getElementsByClassName("mySlides");
            for (let i=0; i<s.length; i++) s[i].style.display = "none";
            idx++; if (idx > s.length) idx = 1;
            s[idx-1].style.display = "block";
            setTimeout(startAnim, 3000);
        }

        loadProfile();
        initSlides();
    </script>
</body>
</html>
