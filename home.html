<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gagan Jaimala | Welcome</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .slideshow-container {
            max-width: 100%; position: relative; margin: 20px auto; height: 350px;
            overflow: hidden; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            background: #f0f0f0;
        }
        .mySlides { display: none; width: 100%; height: 100%; animation: fade 1.5s; }
        .mySlides img { width: 100%; height: 100%; object-fit: cover; }
        @keyframes fade { from {opacity: .4} to {opacity: 1} }
        .hero-content { text-align: center; padding: 40px 20px; }
        .hero-content h2 { color: #5D331D; font-size: 2.5rem; margin-bottom: 10px; }
        .booking-now-btn {
            background: #5D331D; color: white; padding: 18px 40px; font-size: 1.3rem;
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
            text-decoration: none; display: inline-block; transition: 0.3s;
        }
        .booking-now-btn:hover { background: #C5A059; transform: scale(1.05); }
    </style>
</head>
<body>
    <header><h1>Gagan Jaimala</h1></header>
    <div class="container">
        <div class="slideshow-container" id="slideshow-box">
            <p style="text-align:center; padding-top:150px;">Photos लोड हो रही हैं...</p>
        </div>
        <div class="hero-content">
            <h2>गगन जयमाला में आपका स्वागत है</h2>
            <p>बेहतरीन स्टेज और सजावट के लिए बुकिंग करें।</p>
            <a href="categories.html" class="booking-now-btn">Booking Now</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://groivrufuhcnhbygghog.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdyb2l2cnVmdWhjbmhieWdnaG9nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NTA4NzEsImV4cCI6MjA4OTEyNjg3MX0.MpEkthbuaeojJS_mUwyh-RrnHTLQ5SNKnscysqMC7hw'; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function initSlideshow() {
            const { data } = await supabaseClient.from('products').select('media_url').limit(5);
            const box = document.getElementById('slideshow-box');
            if (data && data.length > 0) {
                box.innerHTML = '';
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'mySlides';
                    div.innerHTML = `<img src="${item.media_url}">`;
                    box.appendChild(div);
                });
                startAnimation();
            }
        }

        let slideIndex = 0;
        function startAnimation() {
            let slides = document.getElementsByClassName("mySlides");
            for (let i = 0; i < slides.length; i++) { slides[i].style.display = "none"; }
            slideIndex++;
            if (slideIndex > slides.length) slideIndex = 1;
            slides[slideIndex-1].style.display = "block";
            setTimeout(startAnimation, 3000);
        }
        initSlideshow();
    </script>
</body>
</html>
