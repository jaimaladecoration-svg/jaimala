<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaimala Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; }
        #status-msg { background: #fff3cd; padding: 10px; margin-bottom: 10px; border-radius: 5px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #1a73e8; color: white; }
        tr:hover { background: #f1f1f1; }
    </style>
</head>
<body>

<div class="container">
    <h2>Prince's Order Dashboard 📋</h2>
    <div id="status-msg">System Initializing...</div>
    <button onclick="getOrders()" style="width:100%; padding:12px; background:#1a73e8; color:white; border:none; border-radius:5px; cursor:pointer; font-size:16px;">🔄 Check New Orders</button>

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Customer Name</th>
                    <th>Items Ordered</th>
                    <th>Price</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr><td colspan="4" style="text-align:center;">Waiting for command...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // Config
    const S_URL = 'https://groivrufuhcnhbygghog.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdyb2l2cnVmdWhjbmhieWdnaG9nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NTA4NzEsImV4cCI6MjA4OTEyNjg3MX0.MpEkthbuaeojJS_mUwyh-RrnHTLQ5SNKnscysqMC7hw';
    
    // Initialize Supabase ONLY ONCE
    const supabaseClient = window.supabase.createClient(S_URL, S_KEY);

    async function getOrders() {
        const body = document.getElementById('table-body');
        const status = document.getElementById('status-msg');
        
        status.innerText = "Fetching data from Supabase...";
        body.innerHTML = '<tr><td colspan="4" style="text-align:center;">Loading...</td></tr>';

        try {
            const { data, error } = await supabaseClient
                .from('orders')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                status.innerText = "Error: " + error.message;
                status.style.background = "#fee";
                return;
            }

            status.innerText = "Total Orders: " + data.length;
            status.style.background = "#d4edda";
            body.innerHTML = '';

            if (data.length === 0) {
                body.innerHTML = '<tr><td colspan="4" style="text-align:center;">No orders found in table.</td></tr>';
                return;
            }

            data.forEach(order => {
                const date = new Date(order.created_at).toLocaleString('en-IN');
                body.innerHTML += `
                    <tr>
                        <td>${date}</td>
                        <td><b>${order.customer_name}</b></td>
                        <td>${order.items}</td>
                        <td style="color:green; font-weight:bold;">₹${order.total_price}</td>
                    </tr>
                `;
            });
        } catch (e) {
            status.innerText = "Critical Error: " + e.message;
            status.style.background = "#fee";
        }
    }

    // Auto-fetch when page loads
    window.onload = getOrders;
</script>

</body>
</html>
