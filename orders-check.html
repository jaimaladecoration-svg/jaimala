<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - All Orders</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #333; color: white; }
        tr:nth-child(even) { background: #f9f9f9; }
        .btn-refresh { padding: 10px 20px; background: green; color: white; border: none; cursor: pointer; margin-bottom: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>Prince's Order Dashboard</h2>
    <button class="btn-refresh" onclick="fetchOrders()">🔄 Refresh Orders</button>
    
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Customer Name</th>
                <th>Phone</th>
                <th>Items</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody id="order-table-body">
            </tbody>
    </table>

    <script>
        const SUPABASE_URL = 'https://groivrufuhcnhbygghog.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdyb2l2cnVmdWhjbmhieWdnaG9nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NTA4NzEsImV4cCI6MjA4OTEyNjg3MX0.MpEkthbuaeojJS_mUwyh-RrnHTLQ5SNKnscysqMC7hw';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchOrders() {
            const tbody = document.getElementById('order-table-body');
            tbody.innerHTML = '<tr><td colspan="5">Loading orders...</td></tr>';

            const { data, error } = await supabase
                .from('customer_orders')
                .select('*')
                .order('created_at', { ascending: false }); // Naya order sabse upar

            if (error) {
                alert("Error: " + error.message);
                return;
            }

            tbody.innerHTML = '';
            data.forEach(order => {
                const date = new Date(order.created_at).toLocaleString();
                tbody.innerHTML += `
                    <tr>
                        <td>${date}</td>
                        <td>${order.customer_name}</td>
                        <td>${order.phone}</td>
                        <td>${order.items}</td>
                        <td>₹${order.total_price}</td>
                    </tr>
                `;
            });
        }

        // Page khulte hi orders dikhao
        fetchOrders();
    </script>
</body>
</html>
