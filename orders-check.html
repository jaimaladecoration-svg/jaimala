<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaimala Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background: #1a73e8; color: white; }
        #debug-msg { background: #fff3cd; padding: 10px; margin-bottom: 10px; border: 1px solid #ffeeba; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2>Prince's Order Dashboard 📋</h2>
    <div id="debug-msg">Status: Checking System...</div>
    <button onclick="getOrders()" style="width:100%; padding:10px; cursor:pointer;">🔄 Force Refresh</button>

    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Customer</th>
                <th>Items</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<script>
    const S_URL = 'https://groivrufuhcnhbygghog.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdyb2l2cnVmdWhjbmhieWdnaG9nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NTA4NzEsImV4cCI6MjA4OTEyNjg3MX0.MpEkthbuaeojJS_mUwyh-RrnHTLQ5SNKnscysqMC7hw';
    
    let supabase;

    function initSupabase() {
        try {
            if (typeof supabase === 'undefined') {
                supabase = window.supabase.createClient(S_URL, S_KEY);
                document.getElementById('debug-msg').innerText = "System Ready. Fetching orders...";
                getOrders();
            }
        } catch (e) {
            document.getElementById('debug-msg').innerText = "Critical Error: Supabase failed to load. Check Internet.";
        }
    }

    async function getOrders() {
        const body = document.getElementById('table-body');
        const debug = document.getElementById('debug-msg');
        
        try {
            const { data, error } = await supabase.from('orders').select('*').order('created_at', { ascending: false });

            if (error) {
                debug.innerText = "Supabase Error: " + error.message;
                return;
            }

            debug.innerText = "Successfully Loaded " + data.length + " Orders.";
            body.innerHTML = '';

            data.forEach(order => {
                body.innerHTML += `
                    <tr>
                        <td>${new Date(order.created_at).toLocaleString('en-IN')}</td>
                        <td>${order.customer_name}</td>
                        <td>${order.items}</td>
                        <td>₹${order.total_price}</td>
                    </tr>
                `;
            });
        } catch (e) {
            debug.innerText = "Error: " + e.message;
        }
    }

    // Page load hone par init karo
    window.onload = initSupabase;
</script>
</body>
</html>
