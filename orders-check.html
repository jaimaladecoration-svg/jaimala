<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaimala Decoration - Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 20px; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th { background: #1a73e8; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background-color: #f1f7ff; }
        .booking-id { font-family: monospace; background: #e8f0fe; padding: 2px 6px; border-radius: 4px; color: #1967d2; }
        .price { font-weight: bold; color: #2e7d32; }
        .btn-refresh { display: block; width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-refresh:hover { background: #1557b0; }
        @media (max-width: 600px) { table { font-size: 12px; } .container { padding: 10px; } th, td { padding: 8px; } }
    </style>
</head>
<body>

<div class="container">
    <h2>Prince's Order Dashboard 📋</h2>
    <button class="btn-refresh" onclick="fetchOrders()">🔄 Check New Orders</button>
    
    <div class="stats">
        <span id="total-orders">Total Orders: 0</span>
    </div>

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Booking ID</th>
                    <th>Customer</th>
                    <th>Items</th>
                    <th>Price</th>
                </tr>
            </thead>
            <tbody id="order-list">
                </tbody>
        </table>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://groivrufuhcnhbygghog.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdyb2l2cnVmdWhjbmhieWdnaG9nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NTA4NzEsImV4cCI6MjA4OTEyNjg3MX0.MpEkthbuaeojJS_mUwyh-RrnHTLQ5SNKnscysqMC7hw';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function fetchOrders() {
        const orderList = document.getElementById('order-list');
        orderList.innerHTML = '<tr><td colspan="5" style="text-align:center;">Fetching Orders...</td></tr>';

        const { data, error } = await supabase
            .from('orders') // Screenshots mein table ka naam 'orders' hai
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            console.error(error);
            alert("Data nahi aa raha!");
            return;
        }

        document.getElementById('total-orders').innerText = `Total Orders: ${data.length}`;
        orderList.innerHTML = '';

        data.forEach(order => {
            const date = new Date(order.created_at).toLocaleDateString('en-IN', {
                day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit'
            });

            orderList.innerHTML += `
                <tr>
                    <td>${date}</td>
                    <td><span class="booking-id">${order.booking_id || 'N/A'}</span></td>
                    <td><b>${order.customer_name}</b></td>
                    <td>${order.items}</td>
                    <td class="price">₹${order.total_price}</td>
                </tr>
            `;
        });
    }

    // Load on start
    fetchOrders();
</script>

</body>
</html>
