<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Login/Signup - Gagan Jaimala</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container" style="max-width: 400px; margin: 100px auto; text-align: center; border: 1px solid #ddd; padding: 20px; border-radius: 10px;">
        <h2 id="form-title">Login Karein</h2>
        
        <input type="email" id="email" placeholder="Email Address" style="width:90%; padding: 10px; margin: 10px 0;">
        <input type="password" id="password" placeholder="Password" style="width:90%; padding: 10px; margin: 10px 0;">
        
        <button id="auth-btn" style="width: 95%; padding: 10px; background: #5d331d; color: white; border: none; cursor: pointer;">Login</button>
        
        <p id="toggle-text" style="margin-top: 15px; cursor: pointer; color: blue;">Naya account banayein (Sign Up)</p>
        <p id="msg" style="color: red; margin-top: 10px;"></p>
    </div>

    <script>
        const SUPABASE_URL = 'https://groivrufuhcnhbygghog.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdyb2l2cnVmdWhjbmhieWdnaG9nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NTA4NzEsImV4cCI6MjA4OTEyNjg3MX0.MpEkthbuaeojJS_mUwyh-RrnHTLQ5SNKnscysqMC7hw'; // Yahan apni key dalna
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isLogin = true;
        const authBtn = document.getElementById('auth-btn');
        const toggleText = document.getElementById('toggle-text');
        const msg = document.getElementById('msg');

        toggleText.onclick = () => {
            isLogin = !isLogin;
            document.getElementById('form-title').innerText = isLogin ? "Login Karein" : "Sign Up Karein";
            authBtn.innerText = isLogin ? "Login" : "Sign Up";
            toggleText.innerText = isLogin ? "Naya account banayein (Sign Up)" : "Purana account hai? Login karein";
        };

        authBtn.onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if(isLogin) {
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if(error) msg.innerText = "Galti: " + error.message;
                else window.location.href = 'index.html';
            } else {
                const { error } = await supabase.auth.signUp({ email, password });
                if(error) msg.innerText = "Galti: " + error.message;
                else msg.innerText = "Sign Up safal! Ab login karein.";
            }
        };
    </script>
</body>
</html>
