<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>My Orders | Gagan Jaimala</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background-color: #fffcf5;">

    <header style="background: #5d331d; color: white; padding: 15px; text-align: center;">
        <h1 onclick="window.location.href='index.html'" style="cursor:pointer; margin:0;">Gagan Jaimala</h1>
        <button onclick="window.location.href='categories.html'" style="margin-top:10px; cursor:pointer;">Wapas Jayein</button>
    </header>

    <div class="container" style="max-width: 600px; margin: 20px auto; padding: 10px;">
        <h2 style="text-align: center; color: #5d331d;">Mera Order History</h2>
        <div id="order-list" style="margin-top: 20px; text-align: center;">Orders load ho rahe hain...</div>
    </div>

    <script>
        const SUPABASE_URL = 'https://groivrufuhcnhbygghog.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdyb2l2cnVmdWhjbmhieWdnaG9nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NTA4NzEsImV4cCI6MjA4OTEyNjg3MX0.MpEkthbuaeojJS_mUwyh-RrnHTLQ5SNKnscysqMC7hw';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadHistory() {
            const list = document.getElementById('order-list');
            
            try {
                // 1. User check
                const { data: { user }, error: authError } = await supabase.auth.getUser();
                
                if (authError || !user) {
                    list.innerHTML = "Pehle <a href='auth.html'>Login</a> karein.";
                    return;
                }

                // 2. Fetch Orders
                const { data, error } = await supabase
                    .from('orders')
                    .select('*')
                    .eq('user_id', user.id)
                    .order('created_at', { ascending: false });

                if (error) {
                    list.innerHTML = "Galti: " + error.message;
                    console.error(error);
                    return;
                }

                if (data && data.length > 0) {
                    list.innerHTML = data.map(o => `
                        <div style="border: 1px solid #5d331d; padding: 15px; margin-bottom: 15px; border-radius: 8px; background: white; text-align: left; box-shadow: 2px 2px 10px rgba(0,0,0,0.1);">
                            <p><strong>Booking ID:</strong> ${o.booking_id}</p>
                            <p><strong>Items:</strong> ${o.items}</p>
                            <p><strong>Total:</strong> ₹${o.total_price}</p>
                            <p style="font-size: 0.8em; color: gray;"><strong>Date:</strong> ${new Date(o.created_at).toLocaleString()}</p>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = "<p>Abhi tak koi order nahi mila.</p>";
                }
            } catch (err) {
                list.innerHTML = "Kuch galat hua: " + err.message;
            }
        }
        loadHistory();
    </script>
</body>
</html>
