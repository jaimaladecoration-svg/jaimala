<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | Gagan Jaimala</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; margin: 0; padding: 15px; }
        .header { background: #5d331d; color: white; padding: 15px; text-align: center; margin: -15px -15px 20px -15px; }
        .order-card { background: #1e1e1e; border-radius: 10px; padding: 15px; margin-bottom: 15px; border-left: 6px solid #5d331d; text-align: left; }
        .customer { font-weight: bold; color: #ffab7d; font-size: 1.1em; }
        .items { margin: 10px 0; font-size: 14px; color: #ccc; }
        .date { font-size: 11px; color: #777; }
        #order-list { text-align: center; margin-top: 20px; }
        .btn-home { margin-top: 10px; cursor: pointer; background: white; color: #5d331d; border: none; padding: 8px 20px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0;">Gagan Jaimala</h2>
        <button class="btn-home" onclick="window.location.href='home.html'">Home Par Jayein</button>
    </div>

    <h3 style="text-align:center;">Aapke Orders</h3>
    <div id="order-list">Orders check kiye ja rahe hain...</div>

    <script>
        const SUPABASE_URL = 'https://groivrufuhcnhbygghog.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdyb2l2cnVmdWhjbmhieWdnaG9nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NTA4NzEsImV4cCI6MjA4OTEyNjg3MX0.MpEkthbuaeojJS_mUwyh-RrnHTLQ5SNKnscysqMC7hw';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchMyOrders() {
            const list = document.getElementById('order-list');

            try {
                // 1. Sidha user ka data check karo
                const { data: { user }, error: userError } = await supabase.auth.getUser();

                if (userError || !user) {
                    list.innerHTML = "<p>Aap logged in nahi hain.<br><a href='index.html' style='color:#ffab7d;'>Yahan Click karke Login karein</a></p>";
                    return;
                }

                // 2. Fetching orders with Logged In User ID
                const { data, error } = await supabase
                    .from('orders')
                    .select('*')
                    .eq('user_id', user.id)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!data || data.length === 0) {
                    list.innerHTML = "<p>Aapne abhi tak koi order nahi kiya hai.</p>";
                    return;
                }

                // 3. Render Data
                list.innerHTML = data.map(o => `
                    <div class="order-card">
                        <div class="customer">Order Name: ${o.customer_name}</div>
                        <div class="items"><strong>Items:</strong><br>${o.items}</div>
                        <div class="date">Date: ${new Date(o.created_at).toLocaleString('hi-IN')}</div>
                    </div>
                `).join('');

            } catch (err) {
                list.innerHTML = "<p style='color:red;'>Error: " + err.message + "</p>";
                console.error("Fetch Error:", err);
            }
        }

        // 1 second ka delay taaki Supabase library fully ready ho jaye
        setTimeout(fetchMyOrders, 1000);
    </script>
</body>
</html>
