<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | Gagan Jaimala</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #fffcf5; margin: 0; padding: 15px; }
        .header { background: #5d331d; color: white; padding: 15px; text-align: center; margin: -15px -15px 20px -15px; }
        .order-card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 6px solid #5d331d; text-align: left; }
        .customer { font-weight: bold; color: #5d331d; font-size: 1.1em; }
        .items { margin: 10px 0; font-size: 14px; color: #333; }
        .date { font-size: 11px; color: #777; }
        #order-list { text-align: center; margin-top: 20px; }
        .btn-home { margin-top: 10px; cursor: pointer; background: white; color: #5d331d; border: none; padding: 8px 20px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0;">Gagan Jaimala</h2>
        <button class="btn-home" onclick="window.location.href='home.html'">Home Par Jayein</button>
    </div>

    <h3 style="text-align:center; color: #5d331d;">Aapke Orders</h3>
    <div id="order-list">Data load ho raha hai...</div>

    <script>
        const SUPABASE_URL = 'https://groivrufuhcnhbygghog.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdyb2l2cnVmdWhjbmhieWdnaG9nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NTA4NzEsImV4cCI6MjA4OTEyNjg3MX0.MpEkthbuaeojJS_mUwyh-RrnHTLQ5SNKnscysqMC7hw';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchMyOrders() {
            const list = document.getElementById('order-list');

            try {
                // 1. Session check karna (Ye zyada fast aur reliable hai)
                const { data: { session }, error: sessionError } = await supabase.auth.getSession();

                if (sessionError || !session) {
                    list.innerHTML = "<p>Aap logged in nahi hain. <br><br> <a href='index.html' style='color:#5d331d; font-weight:bold;'>Yahan click karke Login karein</a></p>";
                    return;
                }

                const userId = session.user.id;
                console.log("Logged in User ID:", userId);

                // 2. Fetching only this user's orders
                const { data, error } = await supabase
                    .from('orders')
                    .select('*')
                    .eq('user_id', userId)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!data || data.length === 0) {
                    list.innerHTML = "<p>Aapki koi order history nahi mili.</p>";
                    return;
                }

                // 3. Displaying orders
                list.innerHTML = data.map(o => `
                    <div class="order-card">
                        <div class="customer">Order for: ${o.customer_name}</div>
                        <div class="items"><strong>Details:</strong><br>${o.items}</div>
                        <div class="date">Date: ${new Date(o.created_at).toLocaleString('hi-IN')}</div>
                    </div>
                `).join('');

            } catch (err) {
                list.innerHTML = "<p style='color:red;'>Galti hui: " + err.message + "</p>";
                console.error(err);
            }
        }

        fetchMyOrders();
    </script>
</body>
</html>
