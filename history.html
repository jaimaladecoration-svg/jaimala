<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | Gagan Jaimala</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; margin: 0; padding: 15px; }
        .header { background: #5d331d; color: white; padding: 15px; text-align: center; margin: -15px -15px 20px -15px; }
        
        /* Date Heading Style */
        .date-divider { 
            background: #333; 
            color: #ffab7d; 
            padding: 8px 15px; 
            margin: 20px 0 10px 0; 
            border-radius: 5px; 
            font-size: 14px; 
            font-weight: bold;
            text-align: left;
            border-left: 4px solid #ffab7d;
        }

        .order-card { 
            background: #1e1e1e; 
            border-radius: 10px; 
            padding: 12px; 
            margin-bottom: 12px; 
            border-left: 6px solid #5d331d; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
        }

        .order-img { 
            width: 70px; 
            height: 70px; 
            border-radius: 8px; 
            object-fit: cover; 
            background: #2a2a2a;
        }

        .order-info { flex: 1; text-align: left; }
        .customer { font-weight: bold; color: #ffab7d; font-size: 1.1em; }
        .items { margin: 5px 0; font-size: 14px; color: #ccc; }
        .time { font-size: 11px; color: #777; }
        
        #order-list { margin-top: 10px; }
        .btn-home { margin-top: 10px; cursor: pointer; background: white; color: #5d331d; border: none; padding: 8px 20px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0;">Gagan Jaimala</h2>
        <button class="btn-home" onclick="window.location.href='home.html'">Home Par Jayein</button>
    </div>

    <h3 style="text-align:center;">Your Bookings</h3>
    <div id="order-list">Please wait...</div>

    <script>
        const SUPABASE_URL = 'https://groivrufuhcnhbygghog.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdyb2l2cnVmdWhjbmhieWdnaG9nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NTA4NzEsImV4cCI6MjA4OTEyNjg3MX0.MpEkthbuaeojJS_mUwyh-RrnHTLQ5SNKnscysqMC7hw';
        
        async function fetchOrders() {
            const list = document.getElementById('order-list');
            
            if (typeof window.supabase === 'undefined') {
                list.innerHTML = "Library load nahi hui. Net check karein.";
                return;
            }

            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            try {
                const { data: { user } } = await supabase.auth.getUser();

                if (!user) {
                    list.innerHTML = "Pehle login karein. <br><br><button class='btn-home' onclick=\"window.location.href='index.html'\">Login Page</button>";
                    return;
                }

                // Data fetch karna (Naye orders sabse upar)
                const { data, error } = await supabase
                    .from('orders')
                    .select('*')
                    .eq('user_id', user.id)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (data.length === 0) {
                    list.innerHTML = "<p style='text-align:center;'>No Orders Found.</p>";
                    return;
                }

                let finalHtml = '';
                let lastDate = '';

                data.forEach(o => {
                    // Date Format karna
                    const dateObj = new Date(o.created_at);
                    const dateString = dateObj.toLocaleDateString('hi-IN', { day: 'numeric', month: 'long', year: 'numeric' });
                    const timeString = dateObj.toLocaleTimeString('hi-IN', { hour: '2-digit', minute: '2-digit' });

                    // Agar Date change hui toh heading daalo
                    if (dateString !== lastDate) {
                        finalHtml += `<div class="date-divider">📅 ${dateString}</div>`;
                        lastDate = dateString;
                    }

                    // Product Image (Agar db mein link nahi hai toh placeholder dikhayega)
                    const imgTag = o.image_url 
                        ? `<img src="${o.image_url}" class="order-img" alt="Product">`
                        : `<div class="order-img" style="display:flex;align-items:center;justify-content:center;font-size:10px;background:#333;">No Image</div>`;

                    finalHtml += `
                        <div class="order-card">
                            ${imgTag}
                            <div class="order-info">
                                <div class="customer">Customer: ${o.customer_name}</div>
                                <div class="items">Item: ${o.items}</div>
                                <div class="time">Order Time: ${timeString}</div>
                            </div>
                        </div>
                    `;
                });

                list.innerHTML = finalHtml;

            } catch (err) {
                list.innerHTML = "Galti: " + err.message;
            }
        }

        window.onload = () => {
            setTimeout(fetchOrders, 1000);
        };
    </script>
</body>
</html>
